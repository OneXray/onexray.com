baseURL = '/'
title = 'OneXray'
theme = 'github.com/alex-shpak/hugo-book'

disablePathToLower = true
enableGitInfo = true

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.tableOfContents]
startLevel = 1

[languages]
[languages.en]
languageName = 'English'
contentDir = 'content.en'
weight = 1
[languages.zh]
languageName = '中文'
contentDir = 'content.zh'
weight = 2

[params]
BookTheme = 'auto'

BookToC = true

BookSection = 'docs'

BookRepo = 'https://github.com/OneXray/onexray.com'

BookDateFormat = 'January 2, 2006'

BookComments = false

[module]
[[module.imports]]
path = 'github.com/alex-shpak/hugo-book'
